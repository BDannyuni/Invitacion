<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Especial ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #ffe0b2 100%);
            font-family: 'Quicksand', sans-serif;
            color: #4e342e;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            border: 2px solid #fff;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #ff7043;
        }

        .highlight {
            color: #d84315;
            font-weight: 700;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin: 15px 0;
        }

        .details-box {
            background: #fff8e1;
            padding: 20px;
            border-radius: 20px;
            margin: 25px 0;
            border-left: 5px solid #ffb74d;
        }

        .emoji {
            font-size: 2.5rem;
            display: block;
            margin: 10px 0;
        }

        .btn-container {
            margin-top: 30px;
        }

        button {
            background: #ff7043;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 112, 67, 0.4);
        }

        button:hover {
            background: #f4511e;
            transform: scale(1.05);
        }

        .footer {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="emoji">👋✨</span>
        <h1>¡Hola, Michelle!</h1>
        
        <p>Tengo un plan de ir a Paseo Santa Lucía y quería saber si te gustaría acompañarme.</p>
        
        <p>La idea es simple: <br> 
        <span class="highlight">Caminar, comer y estar contigo.</span></p>

        <div class="details-box">
            <span class="emoji">😋</span>
            <p><strong>El menú estrella:</strong><br>Unos Tostitos preparados de la purisima.</p>
            <hr style="border: 0; border-top: 1px dashed #ffb74d;">
            <p>📅 <strong>Fecha:</strong> 29/03/2026 <br>
            🕔 <strong>Paso por ti a las:</strong> 5:00 PM</p>
        </div>

        <p>¿Te gustaria?</p>

        <div class="btn-container">
            <button onclick="window.location.href='https://wa.me/528186844769?text=¡Hola!%20Claro%20que%20sí%20acepto%20esos%20Tostitos%20😋%20Por%20cierto%20Te%20Quiero%20Mucho%20Amoooor%20🫶🏻🥰'">
                ¡Claro que sí! 🚀
            </button>
        </div>

        <p class="footer"></p>
    </div>

</body>
</html>
